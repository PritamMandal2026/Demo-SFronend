name: Deploy Node.js app to EC2

on:
  push:
    branches:
      - main  # Set this to your defaulut Branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
            node-version: 22
            cache: 'npm'

      - name: Install Dependencies & Build
        run: |
          npm install
          npm run build --if-present

      - name: Copy files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "."
          target: "/home/ubuntu/servicestation-Frontend"

      - name: Restart Application via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/servicestation-Frontend
            npm install --production
            # This handles the 'standalone' error by ensuring we point to the right file
            pm2 delete service || true
            pm2 start .next/standalone/server.js --name "service" || pm2 start server.js --name "service"
            pm2 save
